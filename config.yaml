scraper:
  max_pages: 5
  request_delay_seconds: 2
  script_max_retries: 3
  script_timeout_seconds: 60

# LLM config — change provider/model here to swap models across the app.
# Supported providers: anthropic, openai, google-vertexai, ollama, ...
# (install the matching langchain-<provider> package first)
llm:
  analyst:
    provider: openai
    model: gpt-4o
  script_writer:
    provider: openai
    model: gpt-4o
  matcher:
    provider: openai
    model: gpt-4o

scoring:
  match_threshold: 65       # jobs below this score are skipped
  model: "claude-sonnet-4-6"

resume:
  template_path: "data/profile/resume_template.docx"
  output_dir: "data/resumes"

application:
  headless: true            # set false to watch Playwright in action

dashboard:
  page_size: 20
